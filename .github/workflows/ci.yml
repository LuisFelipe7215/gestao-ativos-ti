name: Continuous Integration - Spring Boot
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Runs Tests with Maven
        run: mvn clean test